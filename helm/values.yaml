replicaCount: 1

image:
  repository: busybox
  pullPolicy: IfNotPresent
  tag: stable

nameOverride: ""
fullnameOverride: ""

podLabels: {}

springProfile: ""

shutdown:
  url: http://localhost:8080/service/shutdown

config:
  json: "{}"

service:
  type: ClusterIP
  port: 8080
  ports:
    - name: api
      port: 8080
      targetPort: 8080
      path: /api
    - name: logs
      port: 8081
      targetPort: 8081
      path: /logs
    - name: soap
      port: 8082
      targetPort: 8082
      path: /soap

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
